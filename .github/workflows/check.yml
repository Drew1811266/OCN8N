name: check

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Package boundary check
        run: npm run package:check

      - name: E2E instructions
        run: |
          echo "Docker n8n E2E is opt-in."
          echo "Run N8N_E2E_API_KEY=<key> npm run test:e2e in a Docker-capable environment."
